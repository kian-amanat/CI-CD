name: CI (Pro, Optimized)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  setup:
    name: Setup and Install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Force Runflare Mirror
        run: npm config set registry https://mirror-npm.runflare.com

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Archive node_modules
        run: tar -czf node_modules.tgz node_modules

      - name: Upload node_modules artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-modules-bundle
          path: node_modules.tgz
          retention-days: 1

  lint-and-types:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-bundle
      - name: Restore node_modules
        run: tar -xzf node_modules.tgz && rm node_modules.tgz
      
      - name: Run Lint
        run: npm run lint
      - name: Run Type Check
        run: npm run type-check || true

  unit-tests:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-bundle
      - name: Restore node_modules
        run: tar -xzf node_modules.tgz && rm node_modules.tgz
      
      - name: Run Tests
        run: npm test -- --ci

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Restore Playwright Browsers Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-bundle
      - name: Restore node_modules
        run: tar -xzf node_modules.tgz && rm node_modules.tgz

      - name: Run Playwright tests
        run: npx playwright test

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint-and-types, unit-tests, e2e-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-bundle
      - name: Restore node_modules
        run: tar -xzf node_modules.tgz && rm node_modules.tgz

      - name: Build app
        run: npm run build
